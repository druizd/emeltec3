# Stack Emeltec Platform.
# Variables compartidas se leen desde el .env raíz (ver .env.example).
# Cada API toma sus secretos sensibles desde su propio .env por servicio.

x-db-env: &db-env
  DB_HOST: timescaledb
  DB_PORT: 5432
  DB_NAME: ${POSTGRES_DB}
  DB_USER: ${POSTGRES_USER}
  DB_PASSWORD: ${POSTGRES_PASSWORD}

x-healthcheck-main-api: &healthcheck-main-api
  test:
    - CMD-SHELL
    - >-
      node -e "fetch('http://localhost:3000/api/v2/health/live')
      .then(r => process.exit(r.ok ? 0 : 1))
      .catch(() => process.exit(1))"
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

x-healthcheck-auth-api: &healthcheck-auth-api
  test:
    - CMD-SHELL
    - >-
      node -e "fetch('http://localhost:3001/api/health')
      .then(r => process.exit(r.ok ? 0 : 1))
      .catch(() => process.exit(1))"
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: emeltec-db
    command: >
      postgres
      -c max_locks_per_transaction=128
      -c shared_buffers=768MB
      -c effective_cache_size=2GB
      -c work_mem=4MB
    ports:
      # EMT-H03: la BD NO debe quedar expuesta a 0.0.0.0. Solo loopback
      # (acceso local / túnel SSH). Los servicios la alcanzan por red interna.
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra-db/init-db:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 3s
      retries: 5

  main-api:
    build: ./main-api
    image: ghcr.io/druizd/emeltec3/main-api:${IMAGE_TAG:-latest}
    container_name: emeltec-api
    ports:
      # EMT-H03: detrás del nginx de borde (proxy a 127.0.0.1:3000). Loopback.
      - '127.0.0.1:${MAIN_API_HOST_PORT:-3000}:3000'
    env_file:
      - ./.env
    volumes:
      # Credenciales GCS para el exporter DGA→GCS (solicitado por CCU_Central).
      # El service account JSON va en ./.secrets/ del host (gitignored) y se
      # monta read-only. DGA_GCS_KEY_FILE en .env debe apuntar a /app/secrets/<archivo>.
      # La carpeta ./.secrets debe existir antes de `docker compose up`.
      - ./.secrets:/app/secrets:ro
    environment:
      <<: *db-env
      NODE_ENV: production
      PORT: 3000
      CSVCONSUMER_HOST: csvconsumer
      CSVCONSUMER_PORT: 50051
      FTPCONSUMER_HOST: ftpconsumer
      FTPCONSUMER_PORT: 50061
      AUTH_API_URL: http://auth-api:3001
      # Workers aprobados 17-07-2026 (retención Ley 21.719, alertas de audit
      # log, contadores materializados). Apagables por .env del host sin
      # tocar este archivo.
      ENABLE_RETENTION_WORKER: ${ENABLE_RETENTION_WORKER:-true}
      ENABLE_AUDIT_ALERTS_WORKER: ${ENABLE_AUDIT_ALERTS_WORKER:-true}
      ENABLE_CONTADORES_DAILY_WORKER: ${ENABLE_CONTADORES_DAILY_WORKER:-true}
      # Hops de proxy confiables (nginx host + nginx contenedor) para que
      # req.ip sea la IP real del cliente en el audit_log.
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-2}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *healthcheck-main-api
    restart: unless-stopped

  linux-db-api:
    build: ./linux-db-api
    image: ghcr.io/druizd/emeltec3/linux-db-api:${IMAGE_TAG:-latest}
    container_name: emeltec-linux-db-api
    ports:
      # EMT-H03/H02: consumido cross-host (procesadores en otra máquina), por eso
      # NO se oculta. Mitigar con: firewall/NSG allowlist al/los host(s) emisor(es)
      # + INTERNAL_API_KEY obligatoria (fail-closed, ya aplicado) + TLS.
      # Ver docs/security-audit/RUNBOOK-FASE-1-puertos-cross-host.md
      - '${LINUX_DB_API_HOST_PORT:-3010}:3010'
    env_file:
      - ./.env
    environment:
      <<: *db-env
      PORT: 3010
      RUST_LOG: info
      PLC_COMMAND_LEASE_SEC: ${PLC_COMMAND_LEASE_SEC:-60}
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget -qO- http://localhost:3010/health >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: emeltec-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  auth-api:
    build: ./auth-api
    image: ghcr.io/druizd/emeltec3/auth-api:${IMAGE_TAG:-latest}
    container_name: emeltec-auth
    ports:
      # EMT-H03: detrás del nginx de borde (proxy a 127.0.0.1:3001). Loopback.
      - '127.0.0.1:${AUTH_API_HOST_PORT:-3001}:3001'
    env_file:
      - ./.env
    environment:
      <<: *db-env
      NODE_ENV: production
      PORT: 3001
      MAIN_API_URL: http://main-api:3000
      # Dos proxies confiables (borde + contenedor frontend) — ver main-api.
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-2}
    depends_on:
      timescaledb:
        condition: service_healthy
      main-api:
        condition: service_healthy
    healthcheck: *healthcheck-auth-api
    restart: unless-stopped

  frontend-angular:
    build:
      context: .
      dockerfile: frontend-angular/Dockerfile
    image: ghcr.io/druizd/emeltec3/frontend-angular:${IMAGE_TAG:-latest}
    container_name: emeltec-frontend
    ports:
      # EMT-H03: detrás del nginx de borde (proxy a 127.0.0.1:5173). Loopback.
      - '127.0.0.1:${FRONTEND_HOST_PORT:-5173}:80'
    depends_on:
      main-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    restart: unless-stopped

  metrics-page:
    build: ./metrics-page
    image: ghcr.io/druizd/emeltec3/metrics-page:${IMAGE_TAG:-latest}
    container_name: emeltec-metrics-page
    ports:
      - '127.0.0.1:${METRICS_HOST_PORT:-8081}:80'
    depends_on:
      main-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    restart: unless-stopped

  landing-emeltec:
    build: ./landing-emeltec
    image: ghcr.io/druizd/emeltec3/landing-emeltec:${IMAGE_TAG:-latest}
    container_name: emeltec-landing
    ports:
      - '127.0.0.1:${LANDING_HOST_PORT:-8082}:80'
    restart: unless-stopped

  csvconsumer:
    build:
      context: ./grpc-pipeline
      dockerfile: csvconsumer-rust.Dockerfile
    image: ghcr.io/druizd/emeltec3/csvconsumer:${IMAGE_TAG:-latest}
    container_name: emeltec-csvconsumer
    ports:
      # EMT-H03/H01: ingesta gRPC consumida cross-host (procesador CSV en otra
      # máquina). Mitigar con firewall/NSG allowlist + auth (interceptor/mTLS) + TLS.
      # Ver docs/security-audit/RUNBOOK-FASE-1-puertos-cross-host.md
      - '${CSVCONSUMER_HOST_PORT:-50051}:50051'
    environment:
      <<: *db-env
      GRPC_PORT: 50051
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  ftpconsumer:
    build:
      context: ./ftp-pipeline
      dockerfile: ftpconsumer-rust.Dockerfile
    image: ghcr.io/druizd/emeltec3/ftpconsumer:${IMAGE_TAG:-latest}
    container_name: emeltec-ftpconsumer
    ports:
      # EMT-H03/H01: ingesta gRPC consumida cross-host (procesador FTP en otra
      # máquina). Mitigar con firewall/NSG allowlist + auth (interceptor/mTLS) + TLS.
      # Ver docs/security-audit/RUNBOOK-FASE-1-puertos-cross-host.md
      - '${FTPCONSUMER_HOST_PORT:-50061}:50061'
    environment:
      <<: *db-env
      FTP_CONSUMER_PORT: 50061
      RUST_LOG: info
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescale_data:
  redis_data:
