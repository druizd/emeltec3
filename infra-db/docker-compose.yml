# ============================================
# Docker Compose - TimescaleDB + pgAdmin 4
# Proyecto: Plataforma de Optimización
# ============================================

services:
  # ---- TimescaleDB (PostgreSQL + TimescaleDB) ----
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-infra
    restart: unless-stopped
    ports:
      # Atado a loopback: la BD no debe quedar expuesta a 0.0.0.0 (Internet).
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER es obligatorio (ver infra-db/.env.example)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD es obligatorio (ver infra-db/.env.example)}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB es obligatorio (ver infra-db/.env.example)}
    volumes:
      # Datos persistentes (no se pierden si el contenedor se elimina)
      - timescaledb_data:/var/lib/postgresql/data
      # Script SQL de inicialización (se ejecuta SOLO la primera vez)
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- pgAdmin 4 (Interfaz web para administrar la BD) ----
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    restart: unless-stopped
    ports:
      # Consola de administración: solo accesible vía loopback / túnel SSH.
      - '127.0.0.1:${PGADMIN_HOST_PORT:-5050}:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL es obligatorio (ver infra-db/.env.example)}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD es obligatorio (ver infra-db/.env.example)}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      # Auto-registro del servidor TimescaleDB
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
    driver: local
  pgadmin_data:
    driver: local
