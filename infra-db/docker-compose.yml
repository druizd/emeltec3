# ============================================
# Docker Compose - TimescaleDB + pgAdmin 4
# Proyecto: Plataforma de Optimización
# ============================================

services:
  # ---- TimescaleDB (PostgreSQL + TimescaleDB) ----
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-infra
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: admin_infra
      POSTGRES_PASSWORD: Infra2026Secure!
      POSTGRES_DB: db_infra
    volumes:
      # Datos persistentes (no se pierden si el contenedor se elimina)
      - timescaledb_data:/var/lib/postgresql/data
      # Script SQL de inicialización (se ejecuta SOLO la primera vez)
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin_infra -d db_infra']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- pgAdmin 4 (Interfaz web para administrar la BD) ----
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@infraproject.com
      PGADMIN_DEFAULT_PASSWORD: Admin2026!
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      # Auto-registro del servidor TimescaleDB
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
    driver: local
  pgadmin_data:
    driver: local
