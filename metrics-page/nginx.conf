server {
    listen 80;
    server_name metrics.emeltec.cl;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 2s;

    location = /health {
        add_header Content-Type text/plain always;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }

    # Login del panel: el operador se autentica contra auth-api para obtener un
    # token Bearer que luego usa en /api/status/detail. Prefijo más específico
    # que /api/, por lo que gana para las rutas de auth.
    location /api/auth/ {
        set $auth_api http://auth-api:3001;
        proxy_pass $auth_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    location /api/ {
        set $main_api http://main-api:3000;
        proxy_pass $main_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    # styles.css NO lleva hash (vite copia public/ tal cual). Si se cachea como
    # immutable, tras un deploy se sigue sirviendo el CSS viejo y la página
    # aparece sin estilos. Match exacto (gana sobre la regex) → revalidar siempre
    # (ETag devuelve 304 cuando no cambió, barato).
    location = /styles.css {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
    }

    # Bundles con hash de contenido (/assets/*) y fuentes: sí immutable.
    location ~* \.(?:js|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }
}
