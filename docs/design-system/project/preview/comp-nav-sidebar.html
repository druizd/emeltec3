<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Josefin Sans';
    src: url('../fonts/JosefinSans-VariableFont_wght.ttf') format('truetype');
    font-weight: 100 700; font-style: normal;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080C12; font-family: 'DM Sans', sans-serif; padding: 0; }
  .sidebar { width: 240px; background: #0F1520; border-right: 1px solid #1E2D42; height: 520px; display: flex; flex-direction: column; }

  .brand { padding: 14px 16px 12px; border-bottom: 1px solid #1E2D42; display: flex; align-items: center; justify-content: space-between; }
  .brand-text { font-family: 'Josefin Sans'; font-size: 18px; font-weight: 700; color: #0DAFBD; letter-spacing: 0.04em; }
  .brand-tag  { font-size: 9px; color: #4A5A72; letter-spacing: 0.1em; text-transform: uppercase; }
  .collapse-btn { color: #4A5A72; cursor: pointer; display: flex; }

  .user-card { margin: 12px 12px; background: #162030; border: 1px solid #253550; border-radius: 10px; padding: 12px; }
  .user-row { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#0DAFBD,#04606A); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #080C12; flex-shrink: 0; position: relative; }
  .avatar-dot { position: absolute; bottom: 1px; right: 1px; width: 8px; height: 8px; border-radius: 50%; background: #22C55E; border: 2px solid #162030; }
  .user-name  { font-size: 13px; font-weight: 600; color: #E8EDF5; }
  .user-role  { font-size: 11px; color: #4A5A72; }
  .user-email { font-size: 11px; color: #0DAFBD; }

  .modules { flex: 1; padding: 8px 0; overflow-y: auto; }
  .module { margin: 2px 10px; border-radius: 8px; overflow: hidden; }
  .module-header {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: #8B9BB8;
    transition: all 0.12s; border-radius: 8px;
    justify-content: space-between;
  }
  .module-header:hover { background: #1C2A3E; color: #E8EDF5; }
  .module-header.active { background: rgba(13,175,189,0.10); color: #0DAFBD; font-weight: 600; }
  .module-header .left { display: flex; align-items: center; gap: 10px; }
  .module-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chevron { color: #253550; transition: transform 0.2s; }
  .chevron.open { transform: rotate(90deg); color: #0DAFBD; }

  .sub-items { padding: 2px 0 4px 50px; }
  .sub-item { font-size: 12px; color: #4A5A72; padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all 0.12s; }
  .sub-item:hover { background: #1C2A3E; color: #8B9BB8; }
  .sub-item.active { color: #0DAFBD; font-weight: 600; }
</style>
</head><body>
<div class="sidebar">

  <div class="brand">
    <div>
      <div class="brand-text">emeltec</div>
      <div class="brand-tag">Experiencia &amp; Flexibilidad</div>
    </div>
    <div class="collapse-btn"><i data-lucide="chevrons-left" style="width:16px;height:16px"></i></div>
  </div>

  <div class="user-card">
    <div class="user-row">
      <div class="avatar">DR<div class="avatar-dot"></div></div>
      <div>
        <div class="user-name">Dylan Ruiz</div>
        <div class="user-role">Admin</div>
        <div class="user-email">druiz@emeltec.cl</div>
      </div>
    </div>
  </div>

  <div class="modules">

    <div class="module">
      <div class="module-header active">
        <div class="left">
          <div class="module-icon" style="background:rgba(13,175,189,0.12);border:1px solid rgba(13,175,189,0.2)">
            <i data-lucide="droplets" style="width:14px;height:14px;color:#0DAFBD"></i>
          </div>
          Consumo de Agua
        </div>
        <i data-lucide="chevron-right" class="chevron open" style="width:14px;height:14px"></i>
      </div>
      <div class="sub-items">
        <div class="sub-item active">Aguas Cachantún</div>
        <div class="sub-item">Cementos Melón</div>
        <div class="sub-item">Cervecera CCU</div>
      </div>
    </div>

    <div class="module">
      <div class="module-header">
        <div class="left">
          <div class="module-icon" style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2)">
            <i data-lucide="cpu" style="width:14px;height:14px;color:#818CF8"></i>
          </div>
          Variables de Proceso
        </div>
        <i data-lucide="chevron-right" class="chevron" style="width:14px;height:14px"></i>
      </div>
    </div>

    <div class="module">
      <div class="module-header">
        <div class="left">
          <div class="module-icon" style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2)">
            <i data-lucide="zap" style="width:14px;height:14px;color:#FBBF24"></i>
          </div>
          Consumo Eléctrico
        </div>
        <i data-lucide="chevron-right" class="chevron" style="width:14px;height:14px"></i>
      </div>
    </div>

    <div class="module">
      <div class="module-header">
        <div class="left">
          <div class="module-icon" style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2)">
            <i data-lucide="flask-conical" style="width:14px;height:14px;color:#22C55E"></i>
          </div>
          Generación de Riles
        </div>
        <i data-lucide="chevron-right" class="chevron" style="width:14px;height:14px"></i>
      </div>
    </div>

    <div class="module">
      <div class="module-header">
        <div class="left">
          <div class="module-icon" style="background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2)">
            <i data-lucide="rocket" style="width:14px;height:14px;color:#FB923C"></i>
          </div>
          Maletas Piloto
        </div>
        <i data-lucide="chevron-right" class="chevron" style="width:14px;height:14px"></i>
      </div>
    </div>

  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
