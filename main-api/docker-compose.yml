services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: emeltec-timescaledb
    ports:
      # EMT-H03/H04: BD solo en loopback y sin password por defecto.
      - '127.0.0.1:${DB_HOST_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${DB_NAME:-telemetry_platform}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es obligatorio (ver .env.example)}
    volumes:
      - tsdb_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 3s
      retries: 5

  main-api:
    build: .
    container_name: emeltec-main-api
    ports:
      # Detrás del proxy: loopback.
      - '127.0.0.1:${PORT:-3000}:${PORT:-3000}'
    env_file:
      - .env
    environment:
      DB_HOST: timescaledb
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tsdb_data:
