# ── Security headers (Ley 21.663 — controles mínimos) ─────────────────────
# Snippet incluible: nginx NO hereda add_header cuando un location declara
# alguno propio (anula TODOS los del server). Por eso estos headers viven en
# un include que se repite en el server block Y en cada location que use
# add_header (hallazgo de auditoría 17-07-2026: producción respondía sin
# ningún security header pese a estar declarados en el server block).
# HSTS solo surte efecto si el borde sirve HTTPS. Harmless en HTTP.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options    "nosniff"                              always;
add_header X-Frame-Options           "DENY"                                 always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy   "same-origin"        always;
add_header Cross-Origin-Resource-Policy "same-origin"        always;
# CSP conservadora compatible con Angular + Material Symbols + Google Fonts.
# img-src incluye los CDNs de tiles del mapa de instalaciones (Leaflet):
# ArcGIS World Imagery (satélite) y CARTO Voyager (callejero). Sin ellos la
# CSP bloquea los tiles y el mapa queda en blanco en producción.
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://server.arcgisonline.com https://*.basemaps.cartocdn.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
