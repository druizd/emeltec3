server {
    listen 80;
    server_name nuevacloud.emeltec.cl;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers en snippet incluible — ver el porqué en el propio archivo.
    include /etc/nginx/snippets/security-headers.conf;

    # security.txt (RFC 9116) servido sin reescritura SPA.
    location = /.well-known/security.txt {
        try_files /.well-known/security.txt =404;
        default_type text/plain;
    }

    # ── Compression ──────────────────────────────────────────────────────
    # Brotli (módulo ngx_http_brotli): preferido sobre gzip (mejor ratio).
    # brotli_static on → sirve el .br pre-generado sin CPU extra en runtime.
    # brotli on → comprime on-the-fly solo si no hay .br estático (ej. API proxy).
    brotli on;
    brotli_static on;
    brotli_comp_level 6;
    brotli_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml font/woff2 font/woff font/ttf;

    # gzip como fallback para clientes sin soporte Brotli.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_static on;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── Asset caching (hashed Angular chunks) ────────────────────────────
    # Angular emite chunks con hash en el nombre (chunk-XXXXX.js, main-YYYY.js).
    # Cuando cambia contenido, cambia hash → URL nueva. Por eso son immutables
    # y no necesitan revalidación. Sin esto, cada chunk paga ~200ms de RTT
    # por revalidación 304 en cada page load.
    location ~* \.(?:js|css|woff2|woff|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        # NO usar `expires` aquí porque agrega su propio max-age → duplicado
        # con el add_header de abajo. Solo Cache-Control explícito.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # add_header en location ANULA todos los heredados del server block →
        # re-emitir el set COMPLETO vía snippet (antes solo se re-emitía
        # nosniff y producción quedaba sin HSTS/CSP/X-Frame — auditoría 17-07).
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # index.html NO hashed → SIEMPRE debe revalidar para detectar nuevos
    # deploys (que invalidan los hashes de los chunks).
    # Las rutas SPA (location /) terminan aquí vía try_files → este location
    # emite la respuesta final y sus add_header son los únicos que aplican.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/auth/ {
        proxy_pass http://auth-api:3001/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://main-api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
