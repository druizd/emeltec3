server {
    listen 80;
    server_name nuevacloud.emeltec.cl;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (Ley 21.663 — controles mínimos) ─────────────────
    # HSTS solo surte efecto si el upstream sirve HTTPS. Harmless en HTTP.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"        always;
    add_header Cross-Origin-Resource-Policy "same-origin"        always;
    # CSP conservadora compatible con Angular + Material Symbols + Google Fonts.
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # security.txt (RFC 9116) servido sin reescritura SPA.
    location = /.well-known/security.txt {
        try_files /.well-known/security.txt =404;
        default_type text/plain;
    }

    # ── Compression ──────────────────────────────────────────────────────
    # gzip/brotli para JS+CSS+JSON. Reduce ~70% transfer size.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── Asset caching (hashed Angular chunks) ────────────────────────────
    # Angular emite chunks con hash en el nombre (chunk-XXXXX.js, main-YYYY.js).
    # Cuando cambia contenido, cambia hash → URL nueva. Por eso son immutables
    # y no necesitan revalidación. Sin esto, cada chunk paga ~200ms de RTT
    # por revalidación 304 en cada page load.
    location ~* \.(?:js|css|woff2|woff|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Re-emitir security headers porque add_header en location reemplaza
        # los heredados del server block.
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # index.html NO hashed → SIEMPRE debe revalidar para detectar nuevos
    # deploys (que invalidan los hashes de los chunks).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/dga/ {
        proxy_pass http://dga-api:3002/api/dga/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/auth/ {
        proxy_pass http://auth-api:3001/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://main-api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
