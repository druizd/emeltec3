@if (auth.isSuperAdmin()) {
  <app-companies-superadmin-view
    [activeTab]="activeTab()"
    [selectedSubCompany]="selectedSubCompany()"
    [sites]="sites()"
    [loading]="loading()"
    [subEmpresaId]="companyService.selectedSubCompanyId() || ''"
    [empresaId]="selectedSubCompany()?.empresa_id || ''"
    (activeTabChange)="setActiveTab($event)"
    (siteSelected)="openSite($event)"
  />
} @else if (auth.isAdmin()) {
  <app-companies-admin-view
    [activeTab]="activeTab()"
    [selectedSubCompany]="selectedSubCompany()"
    [sites]="sites()"
    [loading]="loading()"
    [subEmpresaId]="companyService.selectedSubCompanyId() || ''"
    [empresaId]="selectedSubCompany()?.empresa_id || ''"
    (activeTabChange)="setActiveTab($event)"
    (siteSelected)="openSite($event)"
  />
} @else if (auth.isGerente()) {
  <app-companies-gerente-view
    [activeTab]="activeTab()"
    [selectedSubCompany]="selectedSubCompany()"
    [sites]="sites()"
    [loading]="loading()"
    [subEmpresaId]="companyService.selectedSubCompanyId() || ''"
    [empresaId]="selectedSubCompany()?.empresa_id || ''"
    (activeTabChange)="setActiveTab($event)"
    (siteSelected)="openSite($event)"
  />
} @else {
  <app-companies-cliente-view
    [activeTab]="activeTab()"
    [selectedSubCompany]="selectedSubCompany()"
    [sites]="sites()"
    [loading]="loading()"
    [subEmpresaId]="companyService.selectedSubCompanyId() || ''"
    (activeTabChange)="setActiveTab($event)"
    (siteSelected)="openSite($event)"
  />
}
