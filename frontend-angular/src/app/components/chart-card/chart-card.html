<div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex flex-col h-[400px]">
  <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-2">
      <div
        class="w-8 h-8 rounded-md flex items-center justify-center text-white"
        [style.background-color]="color"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
      </div>
      <div>
        <h3 class="font-semibold text-slate-700">{{ title }}</h3>
        <p class="text-xs text-slate-400">Últimos datos (Preset)</p>
      </div>
    </div>
    <button class="text-slate-400 hover:text-slate-600 transition-colors">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="1" />
        <circle cx="12" cy="5" r="1" />
        <circle cx="12" cy="19" r="1" />
      </svg>
    </button>
  </div>

  <div class="flex-1 w-full h-full relative">
    @if (hasData) {
      <canvas #chartCanvas></canvas>
    } @else {
      <div
        class="absolute inset-0 flex items-center justify-center bg-slate-50 rounded-lg border border-dashed border-slate-200"
      >
        <span class="text-slate-400 text-sm font-medium flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-slate-300 animate-ping"></span>
          Esperando datos...
        </span>
      </div>
    }
  </div>
</div>
