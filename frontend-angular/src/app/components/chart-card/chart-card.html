<article
  class="flex flex-col rounded-xl border border-[#e2e8f0] bg-white p-5 shadow-[0_1px_4px_rgba(15,23,42,0.05)]"
  [style.height]="height"
>
  <header class="mb-5 flex items-center justify-between gap-3">
    <div class="flex min-w-0 items-center gap-2.5">
      <span
        class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md border"
        [style.background-color]="iconBgColor"
        [style.border-color]="iconBorderColor"
        [style.color]="color"
      >
        <span class="material-symbols-outlined text-[16px]">{{ icon }}</span>
      </span>
      <div class="min-w-0">
        <h3
          class="truncate text-[13px] font-semibold text-on-surface"
          style="font-family: var(--font-josefin); letter-spacing: -0.01em;"
        >
          {{ title }}
        </h3>
        @if (subtitle) {
          <p class="truncate text-[11px] text-on-surface-variant">{{ subtitle }}</p>
        }
      </div>
    </div>
  </header>

  <div class="relative w-full flex-1">
    @if (hasData) {
      <canvas #chartCanvas></canvas>
    } @else {
      <div
        class="absolute inset-0 grid place-items-center rounded-lg border border-dashed border-[#e2e8f0] bg-[#f8fafc]"
      >
        <div class="flex flex-col items-center gap-1.5 text-on-surface-muted">
          <span class="material-symbols-outlined text-[28px]">show_chart</span>
          <span class="text-[12px] font-medium">Esperando datos…</span>
        </div>
      </div>
    }
  </div>
</article>
