<article
  class="flex h-full flex-col rounded-xl border border-[#e2e8f0] bg-white p-5 shadow-[0_1px_4px_rgba(15,23,42,0.05)]"
>
  <header class="flex items-start justify-between gap-3">
    <div class="flex items-center gap-2.5 min-w-0">
      <span
        class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg border border-primary-tint-20 bg-primary-tint-08 text-primary-container"
      >
        <span class="material-symbols-outlined text-[18px]">{{ icon || 'sensors' }}</span>
      </span>
      <div class="min-w-0">
        <h3
          class="truncate text-caption font-semibold uppercase tracking-[0.10em] text-on-surface-muted"
          style="font-family: var(--font-josefin)"
        >
          {{ title }}
        </h3>
        <p class="truncate text-caption-xs text-on-surface-variant">{{ formattedTime }}</p>
      </div>
    </div>
  </header>

  <div class="mt-4 flex flex-1 items-baseline gap-1.5">
    <span
      class="text-h3 font-semibold leading-none text-on-surface"
      style="font-family: var(--font-mono); letter-spacing: -0.02em"
    >
      {{ displayValue }}
    </span>
    @if (unit) {
      <span class="text-body-sm font-medium text-on-surface-variant">{{ unit }}</span>
    }
  </div>
</article>
