<div
  class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex flex-col relative overflow-hidden transition-all hover:shadow-md"
>
  <!-- Top section -->
  <div class="flex justify-between items-start mb-4 relative z-10">
    <div class="flex items-center gap-3">
      <div class="p-2 bg-blue-50 rounded-lg text-blue-500">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />
        </svg>
      </div>
      <div>
        <h3 class="font-semibold text-slate-700">{{ title }}</h3>
        <p class="text-xs text-slate-400">{{ formattedTime }}</p>
      </div>
    </div>
  </div>

  <!-- Big Value -->
  <div class="mt-2 flex items-baseline gap-1 relative z-10">
    <span class="text-4xl font-bold text-slate-800 tracking-tight">{{ displayValue }}</span>
    <span class="text-sm font-medium text-slate-500">{{ unit }}</span>
  </div>

  <!-- Bottom -->
  <div class="mt-4 flex items-center justify-between border-t border-slate-50 pt-3 relative z-10">
    <span class="text-xs text-slate-400">vs. anterior</span>
    <span class="flex items-center text-xs font-semibold text-emerald-500">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-3 h-3 mr-1"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="7" y1="17" x2="17" y2="7" />
        <polyline points="7 7 17 7 17 17" />
      </svg>
      Activo
    </span>
  </div>

  <!-- Background decoration -->
  <div
    class="absolute right-0 bottom-0 w-32 h-32 bg-blue-50 rounded-tl-full opacity-50 z-0 border-l border-t border-blue-100"
  ></div>
</div>
