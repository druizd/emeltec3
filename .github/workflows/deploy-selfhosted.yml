name: Deploy self-hosted

# Deploy a producción en push a main usando el runner self-hosted en la VM Azure.
# El runner ejecuta scripts/deploy-production.sh directamente sobre el dir
# productivo (sin SSH). El script preserva los .env del VM, aplica migraciones
# SQL y rebuilda los servicios docker compose.
#
# EMT-H12: el job declara `environment: production`, que tiene "required
# reviewers" configurado en GitHub → cada deploy PAUSA hasta aprobación manual.
# La concurrencia comparte grupo con el deploy SSH manual para que NUNCA dos
# deploys corran a la vez sobre la misma VM/BD.

# NOTA: trigger `push` deshabilitado temporalmente. El paso `docker compose up
# --build` buildea Angular DENTRO de la VM y satura la RAM, colgando la máquina.
# Mientras tanto el deploy va por `deploy-production.yml` (SSH). Reactivar cuando
# el build se mueva fuera de la VM (imágenes pre-construidas + pull en la VM).
on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Linux]
    environment: production

    env:
      APP_DIR: ${{ vars.APP_DIR || '/home/azureuser/emeltec3' }}
      BRANCH: main
      COMPOSE_PROJECT_NAME: emeltec-platform

    steps:
      - name: Checkout workflow code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run deploy script
        run: bash scripts/deploy-production.sh
