name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 11.1.1

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspaces
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm -r --if-present run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

  compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Prepare example env files
        run: |
          cp main-api/.env.example main-api/.env
          cp auth-api/.env.example auth-api/.env
          cp .env.example .env

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Build application images
        run: docker compose build main-api auth-api frontend-angular metrics-page landing-emeltec csvconsumer
