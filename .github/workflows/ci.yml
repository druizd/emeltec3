name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install workspaces
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare example env files
        run: |
          cp main-api/.env.example main-api/.env
          cp auth-api/.env.example auth-api/.env
          cp .env.example .env

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Build application images
        run: docker compose build main-api auth-api frontend-angular metrics-page csvconsumer
