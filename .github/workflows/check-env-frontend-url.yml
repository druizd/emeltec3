name: Check FRONTEND_URL (temporal)

# Workflow temporal de verificación: lee FRONTEND_URL del .env de la VM
# usando el runner self-hosted. Sin secretos en el output (es solo una URL).
# Eliminar después de usar.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: [self-hosted, Linux]
    steps:
      - name: Leer FRONTEND_URL del .env
        run: |
          if grep -n '^FRONTEND_URL' "$HOME/emeltec3/.env"; then
            echo "FRONTEND_URL definida en .env (gana sobre el default del código)"
          else
            echo "FRONTEND_URL NO definida en .env — aplica el default del código"
          fi
