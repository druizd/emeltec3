name: Test welcome email (temporal)

# Workflow temporal: dispara un mail de bienvenida real vía el endpoint
# interno de main-api (loopback en la VM) para verificar el enlace
# nuevacloud.emeltec.cl. La clave interna se lee del .env y NO se imprime.
# Eliminar después de usar.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: [self-hosted, Linux]
    steps:
      - name: Enviar mail de bienvenida de prueba
        run: |
          KEY="$(grep -E '^INTERNAL_API_KEY=' "$HOME/emeltec3/.env" | tail -n1 | cut -d= -f2- | tr -d '\r')"
          if [ -z "$KEY" ]; then
            echo "ERROR: INTERNAL_API_KEY no encontrada en .env"
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w '%{http_code}' \
            -X POST http://127.0.0.1:3000/api/internal/email/otp \
            -H 'Content-Type: application/json' \
            -H "x-internal-key: $KEY" \
            -d '{"email":"druiz@emeltec.cl","nombre":"Daniel Ruiz (prueba)","code":"000000","minutes":30}')
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          echo
          [ "$HTTP_CODE" = "200" ]
